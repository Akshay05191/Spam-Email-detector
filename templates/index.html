<!DOCTYPE html>
<html>
<head>
    <title>Spam Email Classifier</title>
    <style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    padding: 40px;
}

.container {
    background: #111827;
    padding: 20px;
    border-radius: 10px;
    width: 420px;
}

textarea {
    width: 100%;
    padding: 10px;
}

button {
    margin-top: 10px;
    padding: 8px 16px;
    cursor: pointer;
}
</style>

<div class="container">

</head>
<body>
    <h2>📧 Spam Email Classifier</h2>

    <form method="POST">
        <textarea name="email" rows="6" cols="50"
                  placeholder="Enter email text..." required></textarea><br><br>
        <button type="submit">Check</button>
    </form>

    {% if prediction %}
        <h3>{{ prediction }}</h3>
    {% endif %}
</body>
</html>
